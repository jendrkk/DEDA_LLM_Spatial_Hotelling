# groups/competition_neighbourhood.yaml - two active divisions (2x2 = 4 groups)
# With both divisions active, the CEO outputs 4 group envelopes (HEAVY_RICH,
# HEAVY_POOR, EASY_RICH, EASY_POOR), each with 5 parameters = 20 total CEO
# output parameters per epoch. At most 2 simultaneous divisions enforced by
# config validation. See ADR-009.

active_divisions:
  - DIVISION_COMPETITION
  - DIVISION_NEIGHBOURHOOD

competition_radius_m: 500.0           # radius (metres) for counting rival stores
competition_threshold_n_rivals: 3     # stores with >= this many rivals are HEAVY
neighbourhood_status_threshold: 0.5   # median split of LOR S-index; >= is RICH
